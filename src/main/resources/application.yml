spring:
  application:
    name: gestionale-riparazioni
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true

server:
  port: ${SERVER_PORT:8080}
